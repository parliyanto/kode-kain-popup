<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Kode Kain Selector</title>
  <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #182230;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-soft: #eaf2ff;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --shadow-hover: 0 14px 34px rgba(37, 99, 235, 0.14);
      --radius-xl: 18px;
      --radius-lg: 14px;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #f7faff 0%, #f4f7fb 100%);
      color: var(--text);
    }

    .container {
      max-width: 100%;
    }

    .header {
      margin-bottom: 18px;
      padding: 4px 2px;
    }

    .title {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
    }

    .subtitle {
      margin: 7px 0 0 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 14px 0;
    }

    .meta-item {
      background: #eef3f8;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      color: #334155;
      font-weight: 600;
    }

    .search-box {
      margin-bottom: 16px;
    }

    .search-box input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ccd6e0;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
    }

    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 18px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
      border-radius: 0 10px 10px 0;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #bfdbfe;
      box-shadow: var(--shadow-hover);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      padding-left: 8px;
    }

    .kain-wrap {
      min-width: 0;
    }

    .kain-label {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .kain-code {
      font-size: 18px;
      font-weight: 800;
      color: #0f172a;
      line-height: 1.35;
      word-break: break-word;
      letter-spacing: -0.01em;
    }

    .unit-badge {
      flex-shrink: 0;
      max-width: 42%;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      border: 1px solid #cfe0ff;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding-left: 8px;
    }

    .info-box {
      background: #f8fafc;
      border: 1px solid #edf2f7;
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      min-height: 70px;
    }

    .info-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 800;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .info-icon {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #eef4ff;
      color: #2563eb;
      font-size: 12px;
      flex-shrink: 0;
    }

    .info-value {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      line-height: 1.45;
      word-break: break-word;
    }

    .footer-hint {
      margin-top: 12px;
      padding-left: 8px;
      font-size: 12px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-hint .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.10);
    }

    .empty {
      padding: 24px;
      text-align: center;
      background: #fff;
      border: 1px dashed #cbd5e1;
      border-radius: var(--radius-xl);
      color: var(--muted);
      font-size: 14px;
      box-shadow: var(--shadow);
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 15px;
      }

      .card-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .unit-badge {
        max-width: 100%;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .kain-code {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h2 class="title">Pilih Kode Kain</h2>
      <p class="subtitle">
        Pilih salah satu Kode Kain yang paling sesuai dari detail BOM untuk mengisi subform Quote.
      </p>

      <div class="meta">
        <div class="meta-item">BOM: <span id="bomCodeText">-</span></div>
        <div class="meta-item">Code Period: <span id="codePeriodText">-</span></div>
        <div class="meta-item">Total Kode Kain: <span id="totalText">0</span></div>
      </div>
    </div>

    <div class="search-box">
      <input id="searchInput" type="text" placeholder="Cari Kode Kain / Nama Barang / Satuan..." />
    </div>

    <div id="list" class="list"></div>
  </div>

  <script>
    let pageData = {};
    let originalCandidates = [];

    function safeValue(val) {
      if (val === null || val === undefined || val === "") return "-";
      return val;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatNumber(value) {
      if (value === null || value === undefined || value === "") return "-";

      const num = Number(value);

      if (isNaN(num)) return value;

      return num.toLocaleString("id-ID");
    }

    function normalize(value) {
      if (value === null || value === undefined) return "";
      return String(value).toLowerCase().trim();
    }

    function getKodeKain(item) {
      return item.kode_kain || item.item_code || "-";
    }

    function getItemName(item) {
      return item.item_name || item.nama_barang || item.product_name || item.name || "-";
    }

    function getSatuan(item) {
      return item.satuan || item.unit || "-";
    }

    function getMuf(item) {
      return item.muf !== undefined ? item.muf : item.jumlah;
    }

    function getCogs(item) {
      return item.cogs;
    }

    function selectKain(item) {
      const payload = {
        selectedKain: {
          kode_kain: item.kode_kain || item.item_code || "",
          muf: item.muf !== undefined ? item.muf : (item.jumlah !== undefined ? item.jumlah : null),
          cogs: item.cogs !== undefined ? item.cogs : null,
          item_name: item.item_name || "",
          nama_barang: item.nama_barang || "",
          satuan: item.satuan || item.unit || ""
        },
        rowIndex: pageData.rowIndex ?? null,
        codePeriod: pageData.codePeriod || "",
        bomCode: pageData.bomCode || ""
      };

      console.log("Closing Kode Kain popup with payload:", payload);

      // Ini pattern yang sama dengan widget BOM kamu
      $Client.close(payload);
    }

    function renderCandidates(candidates) {
      const list = document.getElementById("list");
      list.innerHTML = "";

      if (!candidates || !candidates.length) {
        list.innerHTML = '<div class="empty">Tidak ada kandidat Kode Kain.</div>';
        return;
      }

      candidates.forEach((item) => {
        const kodeKain = escapeHtml(safeValue(getKodeKain(item)));
        const itemName = escapeHtml(safeValue(getItemName(item)));
        const satuan = escapeHtml(safeValue(getSatuan(item)));
        const muf = escapeHtml(formatNumber(getMuf(item)));
        const cogs = escapeHtml(formatNumber(getCogs(item)));

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="card-top">
            <div class="kain-wrap">
              <div class="kain-label">Kode Kain</div>
              <div class="kain-code">${kodeKain}</div>
            </div>
            <div class="unit-badge" title="${satuan}">${satuan}</div>
          </div>

          <div class="grid">
            <div class="info-box">
              <div class="info-label">
                <span class="info-icon">#</span>
                Nama / Item Name
              </div>
              <div class="info-value">${itemName}</div>
            </div>

            <div class="info-box">
              <div class="info-label">
                <span class="info-icon">∑</span>
                MUF / Jumlah
              </div>
              <div class="info-value">${muf}</div>
            </div>

            <div class="info-box">
              <div class="info-label">
                <span class="info-icon">Rp</span>
                COGS
              </div>
              <div class="info-value">${cogs}</div>
            </div>

            <div class="info-box">
              <div class="info-label">
                <span class="info-icon">✓</span>
                Status
              </div>
              <div class="info-value">Siap dipilih</div>
            </div>
          </div>

          <div class="footer-hint">
            <span class="dot"></span>
            Klik card untuk memilih Kode Kain ini
          </div>
        `;

        card.addEventListener("click", function () {
          selectKain(item);
        });

        list.appendChild(card);
      });
    }

    function filterCandidates(keyword) {
      const q = normalize(keyword);

      if (!q) {
        renderCandidates(originalCandidates);
        return;
      }

      const filtered = originalCandidates.filter((item) => {
        const kodeKain = normalize(getKodeKain(item));
        const itemName = normalize(getItemName(item));
        const satuan = normalize(getSatuan(item));
        const muf = normalize(getMuf(item));
        const cogs = normalize(getCogs(item));

        return (
          kodeKain.includes(q) ||
          itemName.includes(q) ||
          satuan.includes(q) ||
          muf.includes(q) ||
          cogs.includes(q)
        );
      });

      renderCandidates(filtered);
    }

    document.getElementById("searchInput").addEventListener("input", function(e) {
      filterCandidates(e.target.value);
    });

    ZOHO.embeddedApp.on("PageLoad", function(data) {
      console.log("Kode Kain Widget PageLoad data:", data);

      pageData = data || {};
      originalCandidates = pageData.candidates || [];

      document.getElementById("bomCodeText").innerText = safeValue(pageData.bomCode);
      document.getElementById("codePeriodText").innerText = safeValue(pageData.codePeriod);
      document.getElementById("totalText").innerText = originalCandidates.length;

      console.log("Kode Kain candidates:", originalCandidates);

      renderCandidates(originalCandidates);
    });

    ZOHO.embeddedApp.init();
  </script>
</body>
</html>
